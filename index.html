<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Менің видеоларым</title>
<style>
body { font-family: Arial; padding: 20px; background: #f0f0f0; text-align: center; }
video, iframe { max-width: 100%; margin: 20px 0; }
</style>
</head>
<body>
<h1>Менің видеоларым</h1>

<!-- YouTube видео -->
<h3>YouTube видео</h3>
<iframe width="560" height="315" 
src="https://youtu.be/r1ZZn-vgwVc?si=g8z-Hnmd-aIQY058 embed/ВИДЕО_ID" 
frameborder="0" allowfullscreen></iframe>

<!-- Жай видео файл -->
<h3>Жай видео</h3>
<video controls>
  <source src="video.mp4" type="video/mp4">
  Сіздің браузеріңіз видео ойнатуды қолдамайды.
</video>

</body>
</html>
